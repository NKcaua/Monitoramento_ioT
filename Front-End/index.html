<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento IoT - Laboratórios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Dashboard IoT AEMS</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for lab in laboratorios %}
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">{{ lab['laboratorio'] }}</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">
                                <strong>Temperatura:</strong> {{ lab['temperatura'] }} °C
                            </li>
                            <li class="list-group-item">
                                <strong>Umidade:</strong> {{ lab['umidade'] }}%
                            </li>
                            <li class="list-group-item">
                                <strong>Presença:</strong>
                                {% if lab['presenca'] %}
                                    <span class="badge bg-success">Detectada</span>
                                {% else %}
                                    <span class="badge bg-secondary">Vazio</span>
                                {% endif %}
                            </li>
                            <li class="list-group-item text-muted small">
                                Registrado em: {{ lab['data_hora'] }}
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
